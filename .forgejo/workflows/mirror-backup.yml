# Tier 2 — scheduled repo mirror/backup with failure-alerting (per-repo)
#
# DEPLOY: copy to .forgejo/workflows/mirror-backup.yml in any repo on the StartOS
#   Forgejo you want mirrored offsite. Then add repo secrets
#   (repo → Settings → Actions → Secrets):
#     MIRROR_URL   — full https push URL of the mirror remote, WITHOUT credentials
#                    e.g. https://git.example.com/user/repo.git
#     MIRROR_TOKEN — access token for that remote (write scope)
#     NTFY_URL     — full ntfy topic URL for failure alerts
#                    e.g. https://ntfy.example.com/repo-mirror-alerts
#     NTFY_AUTH    — (optional) full Authorization header value for ntfy,
#                    e.g. "Bearer tk_..." — omit if the topic is open
# VERIFY: Actions tab → run "mirror" manually via workflow_dispatch → green run →
#   confirm the mirror remote received the push. Then break MIRROR_TOKEN on purpose
#   once to confirm the ntfy alert actually fires (test the dead-man path!).
#
# DESIGN NOTES:
#   - Plain-git checkout, NOT actions/checkout: the StartOS runner container lacks
#     `git`, so ANY `uses:` action fails at fetch (same bug check.yml works around;
#     logged for the upstream PR to Matt).
#   - `git clone --mirror` = bare clone with FULL history and all branches/tags.
#     Push with --all + --tags (not --mirror): Forgejo/Gitea reject hidden refs
#     like refs/pull/* that --mirror would try to push.
#   - Failure-alerting ships IN THIS FILE (if: failure() step) — silent scheduled
#     jobs are a footgun. Alert on failure only, no success spam.
#   - NEVER put the token in MIRROR_URL or this file. Secrets only.
#   - `schedule` support: Forgejo Actions supports cron triggers; if the scheduled
#     run never fires on this Forgejo version, note it as friction for Matt and
#     drive it via workflow_dispatch + external cron meanwhile.
name: mirror
on:
  schedule:
    - cron: '17 4 * * *'   # daily 04:17 — offset from :00 to avoid thundering herd
  workflow_dispatch:        # manual trigger for testing
jobs:
  mirror:
    runs-on: test           # MUST match the runner's registered label
    env:
      GITHUB_TOKEN: ${{ github.token }}
      MIRROR_URL: ${{ secrets.MIRROR_URL }}
      MIRROR_TOKEN: ${{ secrets.MIRROR_TOKEN }}
      NTFY_URL: ${{ secrets.NTFY_URL }}
      NTFY_AUTH: ${{ secrets.NTFY_AUTH }}
    steps:
      - name: mirror clone (full history)
        run: |
          git clone --mirror "http://ci:${GITHUB_TOKEN}@${GITHUB_SERVER_URL#*://}/${GITHUB_REPOSITORY}.git" repo.git
      - name: push to mirror
        run: |
          cd repo.git
          git remote add mirror "$(echo "${MIRROR_URL}" | sed "s#https://#https://oauth2:${MIRROR_TOKEN}@#")"
          git push mirror --all --force
          git push mirror --tags --force
      - name: alert on failure
        if: failure()
        run: |
          if [ -n "${NTFY_AUTH}" ]; then
            AUTH=(-H "Authorization: ${NTFY_AUTH}")
          else
            AUTH=()
          fi
          curl -fsS -m 10 "${AUTH[@]}" \
            -H "Title: mirror FAILED: ${GITHUB_REPOSITORY}" \
            -H "Priority: high" \
            -d "Scheduled mirror of ${GITHUB_REPOSITORY} failed on $(date -u +%Y-%m-%dT%H:%MZ). Check Actions log." \
            "${NTFY_URL}"
