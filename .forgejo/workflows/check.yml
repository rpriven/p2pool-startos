# p2pool-startos — typecheck CI (Tier 1)
# NOTE: uses plain git clone instead of actions/checkout@v4 — on this runner the
# action fetch fails instantly (friction logged for Matt). Revisit when resolved.
name: check
on:
  push:
  pull_request:
jobs:
  typecheck:
    runs-on: test          # MUST match the runner's registered label
    steps:
      - run: git clone --depth 1 --branch "${GITHUB_REF_NAME}" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" . && git checkout "${GITHUB_SHA}" || true
      - run: npm ci
      - run: npx tsc --noEmit
