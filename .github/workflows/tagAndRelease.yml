name: Tag and Release

on:
  # Auto-publish on push is intentionally disabled until this package's release
  # registry + S3 are configured (REFERENCE_REGISTRY / RELEASE_REGISTRY / S3_*).
  # During dev, validate builds via build.yml (PR / manual dispatch). Re-enable the
  # push trigger below once you're ready to publish releases.
  workflow_dispatch:
  # push:
  #   branches: ['main']
  #   paths-ignore: ['*.md']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tag:
    uses: start9labs/shared-workflows/.github/workflows/tagAndRelease.yml@master
    with:
      REFERENCE_REGISTRY: ${{ vars.REFERENCE_REGISTRY }}
      # FREE_DISK_SPACE: true
      RELEASE_REGISTRY: ${{ vars.RELEASE_REGISTRY }}
      S3_S9PKS_BASE_URL: ${{ vars.S3_S9PKS_BASE_URL }}
    secrets:
      DEV_KEY: ${{ secrets.DEV_KEY }}
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
    permissions:
      contents: write
